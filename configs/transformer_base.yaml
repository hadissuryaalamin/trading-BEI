# Baseline transformer trading-policy experiment.
experiment_name: transformer_base
seed: 42

data:
  panel: data/processed/panel.parquet
  universe: all            # all | lq45 | idx80 | custom
  min_dollar_volume: 0     # set >0 to filter illiquid names
  start: 2022-01-03
  end: 2026-07-02

split:                     # walk-forward, by date (no random split)
  train_end: 2024-12-31
  val_end: 2025-06-30
  # test = val_end .. data.end

features:
  # Ablation-driven: pick economic groups (see ABLATION_PLAN.md / preprocess.FEATURE_GROUPS).
  #   G1 return&momentum | G2 vol/range | G3 volume&liquidity | G4 foreign | G5 microstructure
  feature_groups: [G1, G2, G3, G4, G5]
  normalize: cross_sectional_zscore

window:
  lookback: 60
  horizon: 1

model:
  name: transformer
  d_model: 64
  n_heads: 4
  n_layers: 3
  dim_ff: 128
  dropout: 0.1
  pooling: last

train:
  epochs: 50
  batch_size: 512
  lr: 0.0003
  weight_decay: 0.00001
  early_stop_patience: 8
  objective: sharpe          # sharpe (DLSA-style: max long-only portfolio Sharpe) | regression
  turnover_penalty: 0.001
  transaction_cost_bps: 20
  days_per_step: 32          # (sharpe) days per gradient step
  softmax_temp: 1.0          # (sharpe) <1 concentrates weight on top names   # round-trip cost assumption for IDX

portfolio:
  strategy: long_only        # buy top_n each day, sell next day
  top_n: 10                  # number of stocks to hold daily
