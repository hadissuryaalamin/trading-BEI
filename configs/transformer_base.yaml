# Baseline transformer trading-policy experiment.
experiment_name: transformer_base
seed: 42

data:
  panel: data/processed/panel.parquet
  start: 2020-07-01
  end: 2026-07-02

universe:                    # causal liquidity screen (market.apply_universe)
  min_value_idr: 1_000_000_000   # trailing 20d MEDIAN daily traded value >= 1B IDR
  window: 20

split:
  mode: walk_forward         # rolling retrains; test scores stitched across folds
  walk_forward:
    test_start: 2024-07-01   # 4 folds of 6 months -> 2y stitched out-of-sample
    step_months: 6
    val_months: 6
  # mode: single             # alternative: one split
  # train_end: 2024-12-31
  # val_end: 2025-06-30

features:
  # Ablation-driven: pick economic groups (see ABLATION_PLAN.md / preprocess.FEATURE_GROUPS).
  #   G1 return&momentum | G2 vol/range | G3 volume&liquidity | G4 foreign | G5 microstructure
  feature_groups: [G1, G2, G3, G4, G5]
  normalize: cross_sectional_zscore

window:
  lookback: 60
  horizon: 1
  execution_lag: 1           # decide at close t, execute at close t+1 (0 = same-close, diagnostics only)

model:
  name: transformer
  d_model: 64
  n_heads: 4
  n_layers: 3
  dim_ff: 128
  dropout: 0.1
  pooling: last

train:
  epochs: 50
  batch_size: 512
  lr: 0.0003
  weight_decay: 0.00001
  early_stop_patience: 8
  objective: sharpe          # sharpe (DLSA-style: max long-only NET Sharpe) | regression
  days_per_step: 32          # (sharpe) CONSECUTIVE days per gradient step
  softmax_temp: 0.1          # (sharpe) concentrate weights like the traded top-N book
  allow_cash: true           # (sharpe) extra zero logit = retreat to cash at rf

costs:                       # IDX round trip: ~15bps commission/side + 10bps sell tax + spread
  buy_bps: 15
  sell_bps: 25
  rf_annual: 0.055
  default_half_spread_bps: 35   # per-side spread cost when the closing book is empty
  max_half_spread_bps: 200      # cap on per-side spread cost from pathological books

portfolio:
  # long_only_equal_topn            -> top-N by score, equal weight (default)
  # long_only_positive_topn_prorata -> keep score>0, top-N, weight PRO-RATA by
  #     score; empty book -> 100% cash. Needs allow_cash: true (cash anchor = 0).
  strategy: long_only_equal_topn
  top_n: 10
  delist_after: 20
  delist_return: -0.5
