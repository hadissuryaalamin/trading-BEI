# Shared base for the feature-ablation sweep (see ABLATION_PLAN.md).
# Experiments A-E inherit this via `base: _base.yaml` and override ONLY
# `experiment_name` + `features.feature_groups`. Everything else is locked so
# any Sharpe difference is attributable to the feature set (ABLATION_PLAN sec 4).
#
# Flagship model = cross-sectional transformer (attention across stocks) with the
# DLSA-style long-only NET-Sharpe objective. To ablate on the per-stock baseline
# instead, swap the `model`/`train.objective` blocks here in ONE place.
seed: 42

data:
  panel: data/processed/panel.parquet
  start: 2020-07-01          # full scraped history (features warm up causally)
  end: 2026-07-02

universe:                    # causal liquidity screen (market.apply_universe)
  min_value_idr: 1_000_000_000   # trailing 20d MEDIAN daily traded value >= 1B IDR
  window: 20

split:
  mode: walk_forward         # rolling retrains; test scores stitched across folds
  walk_forward:
    test_start: 2024-07-01   # 4 folds of 6 months -> 2y stitched out-of-sample
    step_months: 6           # retrain cadence = fold length
    val_months: 6            # validation window right before each test fold

features:
  normalize: cross_sectional_zscore
  # feature_groups is set per-experiment (A-E)

window:
  lookback: 60
  horizon: 1
  execution_lag: 1           # decide at close t, execute at close t+1 (0 = same-close, diagnostics only)

model:
  name: cross_sectional
  d_model: 64
  n_heads: 4
  temporal_layers: 2         # attention over the 60 days
  cross_layers: 2            # attention across stocks
  dim_ff: 128
  dropout: 0.1
  pooling: last

train:
  epochs: 40
  batch_size: 1              # one day per step (all stocks that day)
  lr: 0.0003
  weight_decay: 0.00001
  early_stop_patience: 8
  objective: sharpe          # DLSA-style: maximize long-only NET portfolio Sharpe
  days_per_step: 32          # (sharpe) CONSECUTIVE days per gradient step (turnover is charged inside)
  softmax_temp: 0.1          # (sharpe) concentrate weights like the traded top-N book
  allow_cash: true           # (sharpe) extra zero logit = retreat to cash at rf

costs:                       # IDX round trip: ~15bps commission/side + 10bps sell tax + spread
  buy_bps: 15
  sell_bps: 25
  rf_annual: 0.055           # BI-rate-ish; Sharpe is computed in excess of this
  default_half_spread_bps: 35   # per-side spread cost when the closing book is empty
  max_half_spread_bps: 200      # cap on per-side spread cost from pathological books

portfolio:
  # long_only_equal_topn            -> top-N by score, equal weight (default)
  # long_only_positive_topn_prorata -> keep score>0, top-N, weight PRO-RATA by
  #     score. "score>0" == above the cash anchor, so it needs allow_cash: true.
  strategy: long_only_equal_topn
  top_n: 10
  delist_after: 20           # held name missing from the panel this many days ...
  delist_return: -0.5        # ... is written down by 50% and removed
