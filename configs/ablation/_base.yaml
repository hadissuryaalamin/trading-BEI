# Shared base for the feature-ablation sweep (see ABLATION_PLAN.md).
# Experiments A-E inherit this via `base: _base.yaml` and override ONLY
# `experiment_name` + `features.feature_groups`. Everything else is locked so
# any Sharpe difference is attributable to the feature set (ABLATION_PLAN sec 4).
#
# Flagship model = cross-sectional transformer (attention across stocks) with the
# DLSA-style long-only Sharpe objective. To ablate on the per-stock baseline
# instead, swap the `model`/`train.objective` blocks here in ONE place.
seed: 42

data:
  panel: data/processed/panel.parquet
  universe: all
  min_dollar_volume: 0
  start: 2022-01-03
  end: 2026-07-02

split:                       # walk-forward, by date (no random split)
  train_end: 2024-12-31
  val_end: 2025-06-30
  # test = val_end .. data.end

features:
  normalize: cross_sectional_zscore
  # feature_groups is set per-experiment (A-E)

window:
  lookback: 60
  horizon: 1

model:
  name: cross_sectional
  d_model: 64
  n_heads: 4
  temporal_layers: 2         # attention over the 60 days
  cross_layers: 2            # attention across stocks
  dim_ff: 128
  dropout: 0.1
  pooling: last

train:
  epochs: 40
  batch_size: 1              # one day per step (all stocks that day)
  lr: 0.0003
  weight_decay: 0.00001
  early_stop_patience: 8
  objective: sharpe          # DLSA-style: maximize long-only portfolio Sharpe
  transaction_cost_bps: 20
  days_per_step: 32          # (sharpe) days per gradient step
  softmax_temp: 1.0          # (sharpe) <1 concentrates weight on top names

portfolio:
  strategy: long_only
  top_n: 10
