# WEEKLY cadence experiment: decide Friday-ish close t, execute close t+1,
# hold ~5 trading days, rebalance (not liquidate) into the new top-N.
#
# Why weekly: at daily cadence the cost math is unwinnable on IDX (~52bps/day
# at 92% turnover -> ~13%/month gross alpha just to break even). Weekly cuts
# the break-even to ~1-2.5%/month gross -- the same order as what momentum /
# foreign-flow signals can plausibly deliver. See PLAN.md update (3).
#
# The bar to beat: baseline_momentum.py (same cadence, no training).
experiment_name: cross_sectional_weekly
seed: 42

data:
  panel: data/processed/panel.parquet
  start: 2020-07-01
  end: 2026-07-02

universe:
  min_value_idr: 1_000_000_000   # trailing 20d MEDIAN daily traded value >= 1B IDR
  window: 20

split:
  mode: walk_forward
  walk_forward:
    test_start: 2024-07-01   # 2y stitched out-of-sample, same window as daily runs
    step_months: 6
    val_months: 6

features:
  feature_groups: [G1, G2, G3, G4, G5]
  normalize: cross_sectional_zscore

window:
  lookback: 60
  horizon: 5                 # label = the ~1-week return actually held: close(t+1) -> close(t+6)
  execution_lag: 1

model:
  name: cross_sectional
  d_model: 64
  n_heads: 4
  temporal_layers: 2
  cross_layers: 2
  dim_ff: 128
  dropout: 0.1
  pooling: last

train:
  epochs: 40
  batch_size: 1
  lr: 0.0003
  weight_decay: 0.00001
  early_stop_patience: 8
  objective: sharpe
  days_per_step: 16          # 16 consecutive WEEKS (~4 months) per gradient step
  softmax_temp: 0.1
  allow_cash: true

costs:
  buy_bps: 15                # simulator: commission; real per-name spread added on top
  sell_bps: 25
  train_buy_bps: 60          # training loss: commission + ~45bps typical half-spread
  train_sell_bps: 70         #   (flat effective cost so the model feels honest prices)
  rf_annual: 0.055
  default_half_spread_bps: 35
  max_half_spread_bps: 200

portfolio:
  # long_only_equal_topn | long_only_positive_topn_prorata (needs allow_cash: true)
  strategy: long_only_equal_topn
  top_n: 10
  rebalance_every: 5         # trade only every 5th trading day (weekly cadence)
  delist_after: 20
  delist_return: -0.5
